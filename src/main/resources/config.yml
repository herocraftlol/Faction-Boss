# Configuration du plugin FactionBosses

# Auto-spawn automatique
auto-spawn:
  # Activer/désactiver le spawn automatique
  enabled: true
  
  # Intervalle minimum entre chaque spawn (en minutes)
  min-interval-minutes: 45
  
  # Intervalle maximum entre chaque spawn (en minutes)
  max-interval-minutes: 60
  
  # Message de préavis X minutes avant le spawn (0 pour désactiver)
  countdown-minutes: 5

# Configuration des bosses
bosses:
  # Cooldown entre deux spawns manuels (en secondes)
  manual-cooldown: 300