name: FactionBoss
version: ${project.version}
main: fr.factionboss.FactionBoss
api-version: '1.21'
description: Plugin de boss aléatoire pour serveur Faction

commands:
  bossspawn:
    description: Force le spawn d'un boss (admin)
    usage: /bossspawn
    permission: factionboss.admin
  bossinfo:
    description: Affiche les infos sur le boss actuel
    usage: /bossinfo
    permission: factionboss.info

permissions:
  factionboss.admin:
    description: Permet de forcer le spawn d'un boss
    default: op
  factionboss.info:
    description: Permet de voir les infos du boss
    default: true
